<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Sangitaba!</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Removes blue tap highlight on mobile */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(-45deg, #ff758c, #ff7eb3, #a29bfe, #fd79a8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: #fff;
            padding: 20px;
        }

        /* Smooth animated background */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Mobile Card */
        .mobile-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 35px;
            padding: 40px 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 5px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            color: #fff;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Modern Image Styling */
        .image-container {
            position: relative;
            margin: 0 auto 25px auto;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            padding: 8px;
            background: linear-gradient(45deg, #fff, #ffeaa7, #fff);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            animation: float 4s ease-in-out infinite;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background-color: #fff;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        p.message {
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.95);
        }

        /* Mobile-friendly Tap Button */
        .celebrate-btn {
            background: #fff;
            color: #ff758c;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }

        .celebrate-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="mobile-card">
        <h1>Happy</h1>
        <h2>Birthday</h2>
        
        <div class="image-container">
            <img src="img.jpg" alt="Sangitaba">
        </div>

        <p class="message">
            Wishing you, <b>Sangitaba</b>, a beautiful day full of laughter, love, and sweet memories. May this year be your best one yet!
        </p>

        <button class="celebrate-btn" onclick="fireConfetti()">Tap for Magic ✨</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Fun, interactive confetti burst attached to the button
        function fireConfetti() {
            var count = 200;
            var defaults = {
                origin: { y: 0.7 },
                zIndex: 1001
            };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
            
            // Provide a tiny vibration on mobile devices if supported
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
        
        // Shoot a small burst on initial load too!
        window.onload = function() {
            setTimeout(function() {
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }, 500);
        };
    </script>
</body>
</html>
