<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sangitaba!</title>
    <style>
        /* Import a beautiful font from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Beautiful warm gradient background */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transform: translateY(50px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5em;
            color: #d63384;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: pulse 2s infinite ease-in-out;
        }

        p.subtitle {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 8px solid #fff;
            object-fit: cover;
            /* Maintains the ratio of your 3264x2448 image */
            aspect-ratio: 4 / 3; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        img:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .message {
            margin-top: 30px;
            font-size: 1.1em;
            color: #444;
            line-height: 1.6;
            padding: 0 20px;
        }

        /* Animations */
        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Responsive adjustments for mobile phones */
        @media (max-width: 600px) {
            h1 { font-size: 3.5em; }
            .card-container { padding: 25px; }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="card-container">
        <h1>Happy Birthday!</h1>
        <p class="subtitle">Wishing you a day filled with love, joy, and wonderful surprises, Sangitaba!</p>
        
        <div class="image-wrapper">
            <img src="img.jpg" alt="A beautiful photo of Sangitaba">
        </div>

        <div class="message">
            <p>May this coming year bring you immense happiness, great health, and all the success in the world. Have a truly spectacular birthday celebration!</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Trigger confetti when the page loads
        window.onload = function() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                // since particles fall down, start a bit higher than random
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        };
    </script>
</body>
</html>
