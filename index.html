<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sangitaba!</title>
    <!-- Google Fonts for Elegance -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6b6b;
            --accent-color: #ffd700;
            --bg-gradient: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            --text-dark: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 1;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Decorative Elements */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: var(--primary-color);
            position: absolute;
            top: -10px;
            animation: fall 3s linear infinite;
        }

        /* Heading Style */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: #d63031;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: fadeInDown 1.5s ease;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #636e72;
            margin-bottom: 30px;
        }

        /* Image Styling */
        .image-frame {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 10px solid white;
            animation: zoomIn 1.2s ease;
        }

        .image-frame img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-frame:hover img {
            transform: scale(1.05);
        }

        /* Message Box */
        .message {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4b4b4b;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Button/Interactive */
        .wish-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5253);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s transform ease, 0.3s box-shadow ease;
            box-shadow: 0 10px 20px rgba(238, 82, 83, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .wish-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(238, 82, 83, 0.4);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        /* Floating Hearts Background */
        .background-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: rgba(214, 48, 49, 0.1);
            font-size: 2rem;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .container { padding: 20px; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="background-decoration" id="bgDecor">
        <!-- Hearts will be added by JS -->
    </div>

    <div class="container">
        <h1>Happy Birthday</h1>
        <h2>Sangitaba</h2>

        <div class="image-frame">
            <!-- Using your specified image -->
            <img src="img.jpg" alt="Sangitaba's Birthday Image">
        </div>

        <div class="message">
            <p>"May your day be as beautiful, bright, and wonderful as you are. <br>
            Sending you love, joy, and infinite happiness on your special day!"</p>
        </div>

        <button class="wish-btn" onclick="celebrate()">Click to Celebrate! ✨</button>
    </div>

    <!-- JS for some interactivity -->
    <script>
        // Create floating hearts
        const decor = document.getElementById('bgDecor');
        for(let i=0; i<15; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 100 + 'vh';
            heart.style.animationDelay = Math.random() * 5 + 's';
            decor.appendChild(heart);
        }

        function celebrate() {
            // Add extra confetti effect
            for(let i=0; i<50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#ff6b6b', '#ffd700', '#4834d4', '#6ab04c'][Math.floor(Math.random()*4)];
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.animationDuration = Math.random() * 2 + 1 + 's';
                document.body.appendChild(confetti);
                
                // Remove confetti after animation
                setTimeout(() => confetti.remove(), 3000);
            }
            alert("Wishing you the happiest of birthdays, Sangitaba! 🎂✨");
        }
    </script>
</body>
</html>
